comments:
  giscus:
    repo: zarathucorp/AngraMyNew
    category: "General"
    mapping: pathname
    reactions-enabled: true
    theme: light

format:
  html:
    theme:
      - cosmo
      - canon/custom.scss
    lang: ko
    toc: true
    toc-depth: 3
  pdf:
    documentclass: book
    classoption:
      - openany
      - 10pt
      - oneside
    pdf-engine: xelatex
    toc: true
    toc-depth: 3
    number-sections: true
    linestretch: 1.6
    colorlinks: true
    linkcolor: black
    urlcolor: black
    citecolor: black
    geometry:
      - paperwidth=176mm
      - paperheight=248mm
      - left=22mm
      - right=22mm
      - top=20mm
      - bottom=25mm
      - headsep=8mm
      - footskip=12mm
      - headheight=14pt
      - heightrounded
    include-in-header:
      text: |
        \usepackage{xeCJK}
        \xeCJKsetup{CJKspace=true, PunctStyle=plain}
        \setCJKmainfont[BoldFont=KoPubWorldBatang_Pro Bold, ItalicFont=KoPubWorldBatang_Pro Medium]{KoPubWorldBatang_Pro Medium}
        \setCJKsansfont[BoldFont=KoPubWorldDotum_Pro Bold]{KoPubWorldDotum_Pro Medium}
        \setCJKmonofont{NanumGothicCoding}
        \usepackage{microtype}
        \usepackage{amsmath}
        \allowdisplaybreaks
        \widowpenalty=10000
        \clubpenalty=10000
        \usepackage{fancyhdr}
        \pagestyle{fancy}
        \fancyhf{}
        \fancyhead[R]{\small\rightmark}
        \fancyfoot[C]{\thepage}
        \fancypagestyle{plain}{\fancyhf{}\fancyfoot[C]{\thepage}\renewcommand{\headrulewidth}{0pt}}
  docx:
    toc: true
    toc-depth: 3
    number-sections: true
    reference-doc: canon/reference.docx
  epub:
    toc: true
    toc-depth: 3
    lang: ko
    css: canon/epub.css

bibliography: canon/book.bib
